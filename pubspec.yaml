name: flowpay
description: "FlowPay — A production-grade merchant payment app demonstrating Clean Architecture, BLoC pattern, and SOLID principles"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.10.0

  # State Management
  flutter_bloc: ^9.1.1

  # Dependency Injection
  get_it: ^8.0.3

  # Functional Programming / Error Handling
  dartz: ^0.10.1

  # Value Equality
  equatable: ^2.1.0

  # Code Generation (immutable models/states)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^15.1.0

  # Charts
  fl_chart: ^1.2.0

  # Formatting
  intl: ^0.20.2

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0

  # Sharing
  share_plus: ^11.0.0
  country_flags: ^4.1.2
  money2: ^6.3.0
  liquid_glass_renderer: ^0.2.0-dev.4
  flutter_credit_card_brazilian: ^2.0.0
  path_provider: ^2.1.6
  http: ^1.6.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
